<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tarot Reading</title>

  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>🔮 Tarot Reading</h1>

    <input id="username" placeholder="Masukkan nama kamu..." />
    <br><br>

    <select id="category">
      <option value="love">Love</option>
      <option value="career">Career</option>
      <option value="life">Life</option>
    </select>

    <br><br>

    <button onclick="setMode(3, 'free')">Free (3 Cards)</button>
    <button onclick="setMode(5, 'paid5')">5 Cards (Rp5.000)</button>
    <button onclick="setMode(7, 'paid10')">7 Cards (Rp10.000)</button>

    <p id="instruction">Pilih mode dulu untuk mulai</p>

    <div id="card-area"></div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
