<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Reading</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔮 Choose Your Cards</h1>

    <div class="controls">
      <button onclick="setMode(1)">1 Card</button>
      <button onclick="setMode(3)">3 Cards</button>
      <button onclick="setMode(5)">5 Cards</button>
    </div>

    <p id="instruction">Pilih mode dulu untuk mulai 🔮</p>

    <div id="card-area"></div>
    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
